<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biometria de Mão Wireframe 3D</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}
#container{
  display:flex;
  width:100vw;
  height:100vh;
}
#leftPanel{
  width:350px;
  background:#111827;
  padding:20px;
  border-right:2px solid #1e293b;
  overflow-y:auto;
}
#leftPanel h1{color:#38bdf8;margin-bottom:10px;}
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}
#registerBtn{background:#22c55e;color:white;}
#verifyBtn{background:#3b82f6;color:white;}
#clearBtn{background:#ef4444;color:white;}
#status{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:#1e293b;
  min-height:120px;
  white-space:pre-line;
}
#rightPanel{
  flex:1;
  position:relative;
}
#threeCanvas{
  width:100%;
  height:100%;
  display:block;
}
#video{display:none;}
.success{color:#22c55e;font-weight:bold;}
.fail{color:#ef4444;font-weight:bold;}
.info{color:#38bdf8;font-weight:bold;}
</style>

</head>
<body>

<div id="container">

  <div id="leftPanel">
    <h1>Biometria de Mão 3D</h1>
    <p>Sistema experimental de autenticação usando geometria 3D da mão.</p>

    <button class="btn" id="registerBtn">Registrar Mão</button>
    <button class="btn" id="verifyBtn">Verificar Identidade</button>
    <button class="btn" id="clearBtn">Limpar Template</button>

    <div id="status">Sistema iniciado...</div>
  </div>

  <div id="rightPanel">
    <canvas id="threeCanvas"></canvas>
    <video id="video" autoplay playsinline></video>
  </div>

</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>

<script>
// ================== ELEMENTOS ==================
const statusBox = document.getElementById("status");
const registerBtn = document.getElementById("registerBtn");
const verifyBtn = document.getElementById("verifyBtn");
const clearBtn = document.getElementById("clearBtn");
const video = document.getElementById("video");
const canvas = document.getElementById("threeCanvas");

// ================== THREE.JS ==================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera3D.position.z = 1.5;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(0,0,3);
scene.add(light);

// ================== POINT CLOUD ==================
const pointsGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(21*3);
pointsGeometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const pointsMaterial = new THREE.PointsMaterial({
  color:0x7dd3fc,
  size:0.02,
  transparent:true,
  opacity:0.9,
  blending:THREE.AdditiveBlending
});

const pointCloud = new THREE.Points(pointsGeometry, pointsMaterial);
scene.add(pointCloud);

// ================== LINHAS ==================
const connections = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
  [1,5],[2,5],[6,10],[10,14],[14,18],
  [3,7],[7,11],[11,15],[15,19],
];

const lines = [];
connections.forEach(conn=>{
  const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const material = new THREE.LineBasicMaterial({color:0x60a5fa, transparent:true, opacity:0.7});
  const line = new THREE.Line(geometry, material);
  scene.add(line);
  lines.push({line,conn});
});

// ================== BIOMETRIA ==================
let savedTemplate = null;
let currentLandmarks = null;

function distance(p1,p2){
  return Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2+(p1.z-p2.z)**2);
}

function extractFeatures(landmarks){
  const features=[];
  const tips=[4,8,12,16,20];
  tips.forEach(i=>features.push(distance(landmarks[0], landmarks[i])));
  for(let i=0;i<tips.length-1;i++) features.push(distance(landmarks[tips[i]], landmarks[tips[i+1]]));
  const fingerBases=[1,5,9,13,17];
  for(let i=0;i<5;i++) features.push(distance(landmarks[fingerBases[i]], landmarks[tips[i]]));
  return normalize(features);
}

function normalize(features){
  const max = Math.max(...features);
  return features.map(v=>v/max);
}

function compareTemplates(t1,t2){
  let sum=0;
  for(let i=0;i<t1.length;i++) sum+=(t1[i]-t2[i])**2;
  return Math.sqrt(sum);
}

// ================== BOTÕES ==================
registerBtn.onclick = ()=>{
  if(!currentLandmarks){
    statusBox.innerHTML="<span class='fail'>Nenhuma mão detectada.</span>";
    return;
  }
  savedTemplate = extractFeatures(currentLandmarks);
  statusBox.innerHTML="<span class='success'>Mão registrada com sucesso!</span>\nTemplate biométrico salvo.";
};

verifyBtn.onclick = ()=>{
  if(!savedTemplate){
    statusBox.innerHTML="<span class='fail'>Nenhum template salvo.</span>";
    return;
  }
  if(!currentLandmarks){
    statusBox.innerHTML="<span class='fail'>Nenhuma mão detectada.</span>";
    return;
  }
  const currentTemplate = extractFeatures(currentLandmarks);
  const similarity = compareTemplates(savedTemplate, currentTemplate);
  const threshold = 0.15;
  if(similarity<threshold){
    statusBox.innerHTML=`<span class='success'>IDENTIDADE CONFIRMADA</span>\n\nSimilaridade: ${similarity.toFixed(4)}\nTemplate corresponde.`;
  }else{
    statusBox.innerHTML=`<span class='fail'>IDENTIDADE NÃO RECONHECIDA</span>\n\nSimilaridade: ${similarity.toFixed(4)}\nTemplate não corresponde.`;
  }
};

clearBtn.onclick = ()=>{
  savedTemplate=null;
  statusBox.innerHTML="<span class='info'>Template removido.</span>";
};

// ================== MEDIAPIPE HANDS ==================
const hands = new Hands({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.6
});

hands.onResults(onResults);

// ================== WEBCAM ==================
const cameraFeed = new Camera(video,{
  onFrame: async ()=>{ await hands.send({image:video}); },
  width:640,
  height:480
});
cameraFeed.start();

// ================== PROCESSAMENTO ==================
function onResults(results){
  if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){
    const landmarks = results.multiHandLandmarks[0];
    currentLandmarks = landmarks;

    // Update point cloud
    const pos = pointCloud.geometry.attributes.position.array;
    landmarks.forEach((lm,i)=>{
      pos[i*3]     = lm.x-0.5;
      pos[i*3+1]   = -lm.y+0.5;
      pos[i*3+2]   = -lm.z;
    });
    pointCloud.geometry.attributes.position.needsUpdate=true;

    // Update lines
    lines.forEach(obj=>{
      const p1 = new THREE.Vector3(
        pos[obj.conn[0]*3],
        pos[obj.conn[0]*3+1],
        pos[obj.conn[0]*3+2]
      );
      const p2 = new THREE.Vector3(
        pos[obj.conn[1]*3],
        pos[obj.conn[1]*3+1],
        pos[obj.conn[1]*3+2]
      );
      obj.line.geometry.setFromPoints([p1,p2]);
    });
  }
}

// ================== ANIMAÇÃO ==================
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera3D);
}
animate();

// ================== RESPONSIVO ==================
window.addEventListener("resize",()=>{
  camera3D.aspect = window.innerWidth/window.innerHeight;
  camera3D.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
